expected_relationships:
  - dim_customer.customer_key -> fact_transactions.customer_key
  - dim_account.account_key -> fact_transactions.account_key
  - dim_date.date_key -> fact_transactions.date_key
  - dim_time.time_key -> fact_transactions.time_key
  - dim_aml_rule.aml_rule_key -> fact_aml_alerts.aml_rule_key
