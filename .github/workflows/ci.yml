name: CI

on:
  push:
  pull_request:

jobs:
  full-local-validation:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run complete local workflow
        run: ./scripts/run_all_local.sh

      - name: Validate infrastructure scaffold
        run: python scripts/validate_infrastructure.py

      - name: Run final structural audit
        run: python scripts/run_final_audit.py --skip-runtime-checks

      - name: Check Python syntax
        run: python -m compileall -q src scripts tests deployment/functions

      - name: Check formatting
        run: >-
          ruff format --check
          scripts/validate_infrastructure.py
          scripts/run_final_audit.py
          tests/test_final_portfolio.py
          deployment/functions/function_app_placeholder.py

      - name: Run ruff
        run: ruff check .

      - name: Run pytest
        run: pytest
